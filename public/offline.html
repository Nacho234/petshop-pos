<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin conexión · Caja</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0; min-height: 100dvh; display: grid; place-items: center;
        font-family: system-ui, -apple-system, sans-serif; background: #faf6ee; color: #23231f;
        padding: 24px; text-align: center;
      }
      @media (prefers-color-scheme: dark) { body { background: #17160f; color: #f7f2e6; } }
      .card { max-width: 22rem; }
      .badge {
        width: 64px; height: 64px; border-radius: 18px; background: #2e7d5b;
        display: grid; place-items: center; margin: 0 auto 20px;
      }
      h1 { font-size: 1.25rem; margin: 0 0 8px; }
      p { color: #8a8474; margin: 0 0 20px; line-height: 1.5; }
      button {
        border: 0; background: #2e7d5b; color: #fff; font-weight: 600; font-size: 1rem;
        padding: 12px 20px; border-radius: 12px; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">
        <svg width="34" height="34" viewBox="0 0 32 32" fill="#fff" aria-hidden="true">
          <ellipse cx="16" cy="20.5" rx="5.4" ry="4.4"/>
          <circle cx="9.5" cy="14.5" r="2.4"/><circle cx="22.5" cy="14.5" r="2.4"/>
          <circle cx="12.5" cy="9.5" r="2.2"/><circle cx="19.5" cy="9.5" r="2.2"/>
        </svg>
      </div>
      <h1>Estás sin conexión</h1>
      <p>No pudimos cargar esta pantalla. Tus datos locales siguen guardados. Reintentá cuando vuelva la conexión.</p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
