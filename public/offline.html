<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin conexión · Caja</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0; min-height: 100dvh; display: grid; place-items: center;
        font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; color: #0f172a;
        padding: 24px; text-align: center;
      }
      @media (prefers-color-scheme: dark) { body { background: #020617; color: #f1f5f9; } }
      .card { max-width: 22rem; }
      .badge {
        width: 56px; height: 56px; border-radius: 16px; background: #2563eb; color: #fff;
        display: grid; place-items: center; margin: 0 auto 20px; font-size: 26px; font-weight: 700;
      }
      h1 { font-size: 1.25rem; margin: 0 0 8px; }
      p { color: #64748b; margin: 0 0 20px; line-height: 1.5; }
      button {
        border: 0; background: #2563eb; color: #fff; font-weight: 600; font-size: 1rem;
        padding: 12px 20px; border-radius: 12px; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">$</div>
      <h1>Estás sin conexión</h1>
      <p>No pudimos cargar esta pantalla. Tus datos locales siguen guardados. Reintentá cuando vuelva la conexión.</p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
